<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camping El Ceibo - Gestión Náutica</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #0277bd; margin-bottom: 5px; }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 5px; color: #333; font-size: 1.2em; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background-color: #0277bd; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { background-color: #01579b; }
        .resumen { background: #e1f5fe; padding: 15px; border-radius: 8px; border: 1px solid #81d4fa; }
        .log-entry { font-size: 14px; border-bottom: 1px solid #ddd; padding: 5px 0; margin: 0; }
        .btn-whatsapp { background-color: #25d366; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>El Ceibo</h1>
    <p style="text-align:center; color: #666;">Control de Náutica</p>

    <!-- SECCIÓN BAJADA NÁUTICA -->
    <div class="section">
        <h2>🚢 Bajada Náutica</h2>
        <label>Embarcación</label>
        <select id="tipoNautica">
            <option value="Lancha/Motor">Lancha / Motor</option>
            <option value="Moto de Agua">Moto de Agua</option>
            <option value="Velero">Velero</option>
            <option value="Semi-rígido">Semi-rígido</option>
        </select>
        <label>Monto $</label>
        <input type="number" id="montoNautica" placeholder="Ej: 5000">
        <button onclick="registrar('Náutica', 'tipoNautica', 'montoNautica')">Registrar Bajada</button>
    </div>

    <!-- SECCIÓN GUARDERÍA -->
    <div class="section">
        <h2>🛶 Guardería (Kayak/SUP)</h2>
        <label>Equipo</label>
        <select id="tipoGuarderia">
            <option value="Kayak Single">Kayak Single</option>
            <option value="Kayak Doble">Kayak Doble</option>
            <option value="Tabla SUP">Tabla SUP</option>
            <option value="Piragua">Piragua</option>
        </select>
        <label>Monto $</label>
        <input type="number" id="montoGuarderia" placeholder="Ej: 1500">
        <button onclick="registrar('Guardería', 'tipoGuarderia', 'montoGuarderia')" style="background-color: #ef6c00;">Registrar Guardería</button>
    </div>

    <!-- RESUMEN DE CAJA -->
    <div class="resumen">
        <h2>💰
